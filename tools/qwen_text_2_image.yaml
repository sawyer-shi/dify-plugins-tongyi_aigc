identity:
  name: "qwen_text_2_image"
  author: "sawyer-shi"
  label:
    en_US: "Qwen Text to Image"
    zh_Hans: "Qwen-文生图"
description:
  human:
    en_US: "Generate images from text using Tongyi Qwen image models"
    zh_Hans: "使用通义Qwen模型根据文本描述生成图像"
  llm: "Generate images from text using Tongyi Qwen image models"
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
    human_description:
      en_US: "Text description of the image you want to generate"
      zh_Hans: "您想要生成的图像的文本描述"
    llm_description: "Text description of the image to generate"
    form: llm
  - name: size
    type: select
    required: false
    label:
      en_US: Image Size
      zh_Hans: 图像尺寸
    human_description:
      en_US: "Size of the generated image"
      zh_Hans: "生成图像的尺寸"
    llm_description: "Size of the generated image"
    form: form
    default: "2048*2048"
    options:
      - value: "2048*2048"
        label:
          en_US: "1:1 (2048*2048, 2.0 default)"
          zh_Hans: "1:1 (2048*2048, 2.0默认)"
      - value: "2688*1536"
        label:
          en_US: "16:9 (2688*1536, 2.0)"
          zh_Hans: "16:9 (2688*1536, 2.0)"
      - value: "1536*2688"
        label:
          en_US: "9:16 (1536*2688, 2.0)"
          zh_Hans: "9:16 (1536*2688, 2.0)"
      - value: "2368*1728"
        label:
          en_US: "4:3 (2368*1728, 2.0)"
          zh_Hans: "4:3 (2368*1728, 2.0)"
      - value: "1728*2368"
        label:
          en_US: "3:4 (1728*2368, 2.0)"
          zh_Hans: "3:4 (1728*2368, 2.0)"
      - value: "1664*928"
        label:
          en_US: "16:9 (1664*928, max/plus)"
          zh_Hans: "16:9 (1664*928, max/plus)"
      - value: "1472*1104"
        label:
          en_US: "4:3 (1472*1104, max/plus)"
          zh_Hans: "4:3 (1472*1104, max/plus)"
      - value: "1328*1328"
        label:
          en_US: "1:1 (1328*1328, max/plus)"
          zh_Hans: "1:1 (1328*1328, max/plus)"
      - value: "1104*1472"
        label:
          en_US: "3:4 (1104*1472, max/plus)"
          zh_Hans: "3:4 (1104*1472, max/plus)"
      - value: "928*1664"
        label:
          en_US: "9:16 (928*1664, max/plus)"
          zh_Hans: "9:16 (928*1664, max/plus)"
  - name: n
    type: number
    required: false
    label:
      en_US: Image Count
      zh_Hans: 出图数量
    human_description:
      en_US: "For qwen-image-2.0 series: 1-6 images. Other models are fixed to 1"
      zh_Hans: "qwen-image-2.0系列支持1-6张，其他模型固定为1"
    llm_description: "Image count. qwen-image-2.0 series supports 1-6; other models are fixed to 1"
    form: form
    default: 1
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: Negative Prompt
      zh_Hans: 反向提示词
    human_description:
      en_US: "Describe what you don't want in the image"
      zh_Hans: "描述不希望在图像中出现的内容"
    llm_description: "Negative prompt to restrict image content"
    form: llm
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: Prompt Extend
      zh_Hans: 提示词智能改写
    human_description:
      en_US: "Enable AI-powered prompt optimization"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: Watermark
      zh_Hans: 水印
    human_description:
      en_US: "Whether to add watermark to the image"
      zh_Hans: "是否在图像上添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: Seed
      zh_Hans: 随机种子
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
  - name: model
    type: select
    required: false
    label:
      en_US: Model Version
      zh_Hans: 模型版本
    human_description:
      en_US: "Choose the Qwen model version"
      zh_Hans: "选择要使用的Qwen模型版本"
    llm_description: "Choose the Qwen model version"
    form: form
    default: "qwen-image-2.0-pro"
    options:
      - value: "qwen-image-2.0-pro"
        label:
          en_US: "Qwen Image 2.0 Pro"
          zh_Hans: "Qwen Image 2.0 Pro"
      - value: "qwen-image-2.0-pro-2026-03-03"
        label:
          en_US: "Qwen Image 2.0 Pro 2026-03-03"
          zh_Hans: "Qwen Image 2.0 Pro 2026-03-03"
      - value: "qwen-image-2.0"
        label:
          en_US: "Qwen Image 2.0"
          zh_Hans: "Qwen Image 2.0"
      - value: "qwen-image-2.0-2026-03-03"
        label:
          en_US: "Qwen Image 2.0 2026-03-03"
          zh_Hans: "Qwen Image 2.0 2026-03-03"
      - value: "qwen-image-max"
        label:
          en_US: "Qwen Image Max"
          zh_Hans: "Qwen Image Max"
      - value: "qwen-image-max-2025-12-30"
        label:
          en_US: "Qwen Image Max 2025-12-30"
          zh_Hans: "Qwen Image Max 2025-12-30"
      - value: "qwen-image-plus"
        label:
          en_US: "Qwen Image Plus"
          zh_Hans: "Qwen Image Plus"
      - value: "qwen-image-plus-2026-01-09"
        label:
          en_US: "Qwen Image Plus 2026-01-09"
          zh_Hans: "Qwen Image Plus 2026-01-09"
      - value: "qwen-image"
        label:
          en_US: "Qwen Image"
          zh_Hans: "Qwen Image"
extra:
  python:
    source: tools/qwen_text_2_image.py
