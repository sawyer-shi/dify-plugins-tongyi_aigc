identity:
  name: "wan_reference_video"
  author: "sawyer-shi"
  label:
    en_US: "Wan-Reference to Video"
    zh_Hans: "Wan-参考生视频"
description:
  human:
    en_US: "Generate video from reference videos using Tongyi Wanxiang API"
    zh_Hans: "使用通义万相模型从参考视频生成新视频"
  llm: "Create video from reference media with customizable parameters. Supports wan2.7-r2v (new media protocol) and wan2.6-r2v/wan2.6-r2v-flash (legacy protocol)."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "AI model to use for reference video generation"
      zh_Hans: "用于参考生视频的AI模型"
    llm_description: "AI model for reference video generation"
    form: form
    default: "wan2.7-r2v"
    options:
      - value: "wan2.7-r2v"
        label:
          en_US: "Wanxiang 2.7 Reference to Video"
          zh_Hans: "万相2.7参考生视频"
      - value: "wan2.6-r2v"
        label:
          en_US: "Wanxiang 2.6 Reference to Video"
          zh_Hans: "万相2.6参考生视频"
      - value: "wan2.6-r2v-flash"
        label:
          en_US: "Wanxiang 2.6 Reference to Video Flash"
          zh_Hans: "万相2.6参考生视频闪速"
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Text description for video generation (wan2.7 max 5000, wan2.6 max 1500)"
      zh_Hans: "视频生成的文本描述（wan2.7 最多5000字符，wan2.6 最多1500字符）"
    llm_description: "Text prompt describing the video to generate"
    form: llm
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: "Negative Prompt"
      zh_Hans: "反向提示词"
    human_description:
      en_US: "Describe what you don't want in the video"
      zh_Hans: "描述不希望在视频中出现的内容"
    llm_description: "Negative prompt to restrict video content"
    form: llm
  - name: reference_urls
    type: string
    required: true
    label:
      en_US: "Reference URLs"
      zh_Hans: "参考文件URL"
    human_description:
      en_US: "Reference URLs (videos/images) separated by semicolons. For wan2.7 they are auto-mapped to media[]; max 5 references."
      zh_Hans: "参考文件URL（视频/图片）用分号分隔。wan2.7 会自动映射到 media[]；最多5个参考素材。"
    llm_description: "Reference URLs (videos or images) separated by semicolons. Used as media references."
    form: llm
  - name: first_frame_image
    type: string
    required: false
    label:
      en_US: "First Frame Image"
      zh_Hans: "首帧图像"
    human_description:
      en_US: "First frame image URL for wan2.7-r2v (optional, max 1)"
      zh_Hans: "wan2.7-r2v 的首帧图像URL（可选，最多1张）"
    llm_description: "Optional first frame image URL for wan2.7-r2v"
    form: llm
  - name: reference_voice
    type: string
    required: false
    label:
      en_US: "Reference Voice URL"
      zh_Hans: "参考音色URL"
    human_description:
      en_US: "Reference voice URL for wan2.7-r2v (wav/mp3, optional)"
      zh_Hans: "wan2.7-r2v 的参考音色URL（wav/mp3，可选）"
    llm_description: "Optional reference voice URL for wan2.7-r2v"
    form: llm
  - name: size
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Video resolution in width*height. Used by wan2.6 models, also used as compatibility mapping input for wan2.7."
      zh_Hans: "视频分辨率（宽*高）。用于 wan2.6，也可作为 wan2.7 的兼容映射输入。"
    llm_description: "Video resolution in width*height format"
    form: form
    default: "1920*1080"
    options:
      - value: "1280*720"
        label:
          en_US: "1280*720 - 720P (16:9)"
          zh_Hans: "1280*720 - 720P (16:9)"
      - value: "720*1280"
        label:
          en_US: "720*1280 - 720P (9:16)"
          zh_Hans: "720*1280 - 720P (9:16)"
      - value: "960*960"
        label:
          en_US: "960*960 - 720P (1:1)"
          zh_Hans: "960*960 - 720P (1:1)"
      - value: "1088*832"
        label:
          en_US: "1088*832 - 720P (4:3)"
          zh_Hans: "1088*832 - 720P (4:3)"
      - value: "832*1088"
        label:
          en_US: "832*1088 - 720P (3:4)"
          zh_Hans: "832*1088 - 720P (3:4)"
      - value: "1920*1080"
        label:
          en_US: "1920*1080 - 1080P (16:9)"
          zh_Hans: "1920*1080 - 1080P (16:9)"
      - value: "1080*1920"
        label:
          en_US: "1080*1920 - 1080P (9:16)"
          zh_Hans: "1080*1920 - 1080P (9:16)"
      - value: "1440*1440"
        label:
          en_US: "1440*1440 - 1080P (1:1)"
          zh_Hans: "1440*1440 - 1080P (1:1)"
      - value: "1632*1248"
        label:
          en_US: "1632*1248 - 1080P (4:3)"
          zh_Hans: "1632*1248 - 1080P (4:3)"
      - value: "1248*1632"
        label:
          en_US: "1248*1632 - 1080P (3:4)"
          zh_Hans: "1248*1632 - 1080P (3:4)"
  - name: duration
    type: number
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Duration in seconds. wan2.6: 2-10. wan2.7: 2-10 with reference video, otherwise 2-15."
      zh_Hans: "生成视频时长。wan2.6: 2-10；wan2.7: 含参考视频时2-10，否则2-15。"
    llm_description: "Duration of the generated video in seconds"
    form: form
    default: "5"
    min: 2
    max: 15
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution Tier"
      zh_Hans: "分辨率档位"
    human_description:
      en_US: "Resolution tier for wan2.7-r2v"
      zh_Hans: "wan2.7-r2v 的分辨率档位"
    llm_description: "Resolution tier for wan2.7-r2v"
    form: form
    default: "1080P"
    options:
      - value: "720P"
        label:
          en_US: "720P"
          zh_Hans: "720P"
      - value: "1080P"
        label:
          en_US: "1080P"
          zh_Hans: "1080P"
  - name: ratio
    type: select
    required: false
    label:
      en_US: "Aspect Ratio"
      zh_Hans: "宽高比"
    human_description:
      en_US: "Aspect ratio for wan2.7-r2v"
      zh_Hans: "wan2.7-r2v 的宽高比"
    llm_description: "Aspect ratio for wan2.7-r2v"
    form: form
    default: "16:9"
    options:
      - value: "16:9"
        label:
          en_US: "16:9"
          zh_Hans: "16:9"
      - value: "9:16"
        label:
          en_US: "9:16"
          zh_Hans: "9:16"
      - value: "1:1"
        label:
          en_US: "1:1"
          zh_Hans: "1:1"
      - value: "4:3"
        label:
          en_US: "4:3"
          zh_Hans: "4:3"
      - value: "3:4"
        label:
          en_US: "3:4"
          zh_Hans: "3:4"
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: "Prompt Extend"
      zh_Hans: "提示词智能改写"
    human_description:
      en_US: "Enable prompt intelligent rewriting"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
    default: true
  - name: shot_type
    type: select
    required: false
    label:
      en_US: "Shot Type"
      zh_Hans: "镜头类型"
    human_description:
      en_US: "Type of video shot (wan2.6 models only)"
      zh_Hans: "视频镜头类型（仅 wan2.6 模型生效）"
    llm_description: "Type of video shot for wan2.6 models"
    form: form
    default: "single"
    options:
      - value: "single"
        label:
          en_US: "Single"
          zh_Hans: "单镜头"
      - value: "multi"
        label:
          en_US: "Multi"
          zh_Hans: "多镜头"
  - name: audio
    type: boolean
    required: false
    label:
      en_US: "Auto Audio"
      zh_Hans: "自动音频"
    human_description:
      en_US: "Automatically add audio to the generated video (wan2.6-r2v-flash only)"
      zh_Hans: "为生成的视频自动添加音频（仅 wan2.6-r2v-flash 支持）"
    llm_description: "Whether to automatically add audio (wan2.6-r2v-flash only)"
    form: form
    default: true
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the video"
      zh_Hans: "在视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
    default: 0
extra:
  python:
    source: tools/wan_reference_video.py
