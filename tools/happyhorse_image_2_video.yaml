identity:
  name: "happyhorse_image_2_video"
  author: "sawyer-shi"
  label:
    en_US: "HappyHorse-Image to Video"
    zh_Hans: "HappyHorse-图生视频"
description:
  human:
    en_US: "Generate video from image using Tongyi HappyHorse API"
    zh_Hans: "使用通义HappyHorse模型从图像生成视频"
  llm: "Create video from image using HappyHorse model with customizable parameters like resolution, duration, watermark, and seed."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "AI model to use for image-to-video generation"
      zh_Hans: "用于图生视频的AI模型"
    llm_description: "AI model for image-to-video generation"
    form: form
    default: "happyhorse-1.0-i2v"
    options:
      - value: "happyhorse-1.0-i2v"
        label:
          en_US: "HappyHorse 1.0 Image to Video"
          zh_Hans: "HappyHorse 1.0 图生视频"
  - name: prompt
    type: string
    required: false
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Text description for video generation"
      zh_Hans: "视频生成的文本描述"
    llm_description: "Text prompt describing the video to generate"
    form: llm
  - name: image_input
    type: file
    required: false
    label:
      en_US: "Image File"
      zh_Hans: "图片文件"
    human_description:
      en_US: "Upload an image file to be used as the first frame"
      zh_Hans: "上传一个图片文件作为视频的第一帧"
    llm_description: "Upload an image file to be used as the first frame"
    form: llm
  - name: img_url
    type: string
    required: false
    label:
      en_US: "First Frame URL"
      zh_Hans: "首帧URL"
    human_description:
      en_US: "Public URL for first frame image (http/https/oss)"
      zh_Hans: "首帧图像的公网URL（http/https/oss）"
    llm_description: "First frame image URL"
    form: llm
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Video resolution. Select 720P or 1080P."
      zh_Hans: "视频分辨率。可选 720P 或 1080P。"
    llm_description: "Resolution for the generated video"
    form: form
    default: "1080P"
    options:
      - value: "720P"
        label:
          en_US: "720P"
          zh_Hans: "720P"
      - value: "1080P"
        label:
          en_US: "1080P"
          zh_Hans: "1080P"
  - name: duration
    type: number
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Duration of the generated video in seconds, range [3, 15]."
      zh_Hans: "生成视频的时长（秒），取值范围[3, 15]。"
    llm_description: "Duration of the generated video in seconds"
    form: form
    default: 5
    min: 3
    max: 15
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the video"
      zh_Hans: "在视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
    default: 0
extra:
  python:
    source: tools/happyhorse_image_2_video.py