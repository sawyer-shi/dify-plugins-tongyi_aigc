identity:
  name: "wan_video_continue"
  author: "sawyer-shi"
  label:
    en_US: "Wan-Video Continue"
    zh_Hans: "Wan-视频续写"
description:
  human:
    en_US: "Continue a video from the first clip using wan2.7-i2v"
    zh_Hans: "基于首段视频进行续写（wan2.7-i2v）"
  llm: "Continue a video using wan2.7-i2v with first_clip or first_clip+last_frame media combinations."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "Model for video continuation (wan2.7-i2v only)"
      zh_Hans: "用于视频续写的模型（仅支持 wan2.7-i2v）"
    llm_description: "Model for video continuation"
    form: form
    default: "wan2.7-i2v"
    options:
      - value: "wan2.7-i2v"
        label:
          en_US: "Wanxiang 2.7 Image to Video"
          zh_Hans: "万相2.7图生视频"
  - name: prompt
    type: string
    required: false
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Describe how the video should continue (max 5000 chars)"
      zh_Hans: "描述视频如何继续生成（最多5000字符）"
    llm_description: "Prompt for continued video content"
    form: llm
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: "Negative Prompt"
      zh_Hans: "反向提示词"
    human_description:
      en_US: "Describe what should not appear in the video (max 500 chars)"
      zh_Hans: "描述不希望在视频中出现的内容（最多500字符）"
    llm_description: "Negative prompt for video continuation"
    form: llm
  - name: first_clip_input
    type: files
    required: false
    label:
      en_US: "First Clip File"
      zh_Hans: "首段视频文件"
    human_description:
      en_US: "Upload first clip file (provide one file, mp4/mov, 2-10s recommended)"
      zh_Hans: "上传首段视频文件（传1个即可，mp4/mov，建议2-10秒）"
    llm_description: "First clip file for continuation"
    form: llm
  - name: first_clip_url
    type: string
    required: false
    label:
      en_US: "First Clip URL"
      zh_Hans: "首段视频URL"
    human_description:
      en_US: "Public or OSS URL for first clip (http/https/oss)"
      zh_Hans: "首段视频的公网或OSS地址（http/https/oss）"
    llm_description: "First clip URL for continuation"
    form: llm
  - name: last_frame_input
    type: files
    required: false
    label:
      en_US: "Last Frame File"
      zh_Hans: "尾帧文件"
    human_description:
      en_US: "Optional last frame image for first_clip+last_frame mode"
      zh_Hans: "可选尾帧图片，用于 first_clip+last_frame 续写模式"
    llm_description: "Optional last frame file"
    form: llm
  - name: last_frame_url
    type: string
    required: false
    label:
      en_US: "Last Frame URL"
      zh_Hans: "尾帧URL"
    human_description:
      en_US: "Optional public or OSS URL for last frame image"
      zh_Hans: "可选尾帧图像公网或OSS地址"
    llm_description: "Optional last frame image URL"
    form: llm
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Output resolution: 720P or 1080P"
      zh_Hans: "输出分辨率：720P 或 1080P"
    llm_description: "Output resolution for video continuation"
    form: form
    default: "1080P"
    options:
      - value: "720P"
        label:
          en_US: "720P"
          zh_Hans: "720P"
      - value: "1080P"
        label:
          en_US: "1080P"
          zh_Hans: "1080P"
  - name: duration
    type: number
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Total output duration in seconds (2-15)"
      zh_Hans: "输出总时长（秒，2-15）"
    llm_description: "Total output duration in seconds"
    form: form
    default: 5
    min: 2
    max: 15
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: "Prompt Extend"
      zh_Hans: "提示词智能改写"
    human_description:
      en_US: "Enable prompt intelligent rewriting"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
    default: true
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the generated video"
      zh_Hans: "在生成视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: false
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed in [0, 2147483647]"
      zh_Hans: "随机种子，范围 [0, 2147483647]"
    llm_description: "Random seed for reproducibility"
    form: form
extra:
  python:
    source: tools/wan_video_continue.py
