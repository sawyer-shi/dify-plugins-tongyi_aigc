identity:
  name: "wan_text_2_video"
  author: "sawyer-shi"
  label:
    en_US: "Wan-Text to Video"
    zh_Hans: "Wan-文生视频"
description:
  human:
    en_US: "Generate video from text using Tongyi Wanxiang API"
    zh_Hans: "使用通义万相API从文本生成视频"
  llm: "Create video from text with customizable parameters including model selection, prompt, resolution, duration, audio settings, and more."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "AI model to use for text-to-video generation"
      zh_Hans: "用于文生视频的AI模型"
    llm_description: "AI model for text-to-video generation"
    form: form
    default: "wan2.6-t2v"
    options:
      - value: "wan2.6-t2v"
        label:
          en_US: "Wanxiang 2.6 Text to Video"
          zh_Hans: "万相2.6文生视频"
      - value: "wan2.5-t2v-preview"
        label:
          en_US: "Wanxiang 2.5 Text to Video Preview"
          zh_Hans: "万相2.5文生视频预览"
      - value: "wan2.2-t2v-plus"
        label:
          en_US: "Wanxiang 2.2 Text to Video Plus"
          zh_Hans: "万相2.2文生视频增强版"
      - value: "wanx2.1-t2v-turbo"
        label:
          en_US: "Wanxiang 2.1 Text to Video Turbo"
          zh_Hans: "万相2.1文生视频加速版"
      - value: "wanx2.1-t2v-plus"
        label:
          en_US: "Wanxiang 2.1 Text to Video Plus"
          zh_Hans: "万相2.1文生视频增强版"
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Text description for video generation"
      zh_Hans: "视频生成的文本描述"
    llm_description: "Text prompt describing the video to generate"
    form: llm
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: "Negative Prompt"
      zh_Hans: "反向提示词"
    human_description:
      en_US: "Describe what you don't want in the video"
      zh_Hans: "描述不希望在视频中出现的内容"
    llm_description: "Negative prompt to restrict video content"
    form: llm
  - name: audio_url
    type: string
    required: false
    label:
      en_US: "Audio URL"
      zh_Hans: "音频URL"
    human_description:
      en_US: "Audio file URL for the video"
      zh_Hans: "视频音频文件URL"
    llm_description: "Audio file URL for the video"
    form: llm
  - name: size
    type: string
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Video resolution (width*height)"
      zh_Hans: "视频分辨率（宽*高）"
    llm_description: "Video resolution in width*height format"
    form: form
    default: "1920*1080"
  - name: duration
    type: string
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Duration of the generated video in seconds"
      zh_Hans: "生成视频的时长（秒）"
    llm_description: "Duration of the generated video in seconds"
    form: form
    default: "5"
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: "Prompt Extend"
      zh_Hans: "提示词智能改写"
    human_description:
      en_US: "Enable AI-powered prompt optimization"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
    default: true
  - name: shot_type
    type: select
    required: false
    label:
      en_US: "Shot Type"
      zh_Hans: "镜头类型"
    human_description:
      en_US: "Type of video shot"
      zh_Hans: "视频镜头类型"
    llm_description: "Type of video shot"
    form: form
    default: "single"
    options:
      - value: "single"
        label:
          en_US: "Single"
          zh_Hans: "单镜头"
      - value: "multi"
        label:
          en_US: "Multi"
          zh_Hans: "多镜头"
  - name: audio
    type: boolean
    required: false
    label:
      en_US: "Auto Audio"
      zh_Hans: "自动音频"
    human_description:
      en_US: "Automatically add audio to the generated video"
      zh_Hans: "为生成的视频自动添加音频"
    llm_description: "Whether to automatically add audio"
    form: form
    default: true
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the video"
      zh_Hans: "在视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: false
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
    default: 0
extra:
  python:
    source: tools/wan_text_2_video.py
