identity:
  name: "wan_text_2_video"
  author: "sawyer-shi"
  label:
    en_US: "Wan-Text to Video"
    zh_Hans: "Wan-文生视频"
description:
  human:
    en_US: "Generate video from text using Tongyi Wanxiang API"
    zh_Hans: "使用通义万相模型从文本生成视频"
  llm: "Create video from text with customizable parameters including model selection, prompt, resolution, duration, audio settings, and more."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "AI model to use for text-to-video generation"
      zh_Hans: "用于文生视频的AI模型"
    llm_description: "AI model for text-to-video generation"
    form: form
    default: "wan2.6-t2v"
    options:
      - value: "wan2.7-t2v"
        label:
          en_US: "Wanxiang 2.7 Text to Video"
          zh_Hans: "万相2.7文生视频"
      - value: "wan2.6-t2v"
        label:
          en_US: "Wanxiang 2.6 Text to Video"
          zh_Hans: "万相2.6文生视频"
      - value: "wan2.5-t2v-preview"
        label:
          en_US: "Wanxiang 2.5 Text to Video Preview"
          zh_Hans: "万相2.5文生视频预览"
      - value: "wan2.2-t2v-plus"
        label:
          en_US: "Wanxiang 2.2 Text to Video Plus"
          zh_Hans: "万相2.2文生视频增强版"
      - value: "wanx2.1-t2v-turbo"
        label:
          en_US: "Wanxiang 2.1 Text to Video Turbo"
          zh_Hans: "万相2.1文生视频加速版"
      - value: "wanx2.1-t2v-plus"
        label:
          en_US: "Wanxiang 2.1 Text to Video Plus"
          zh_Hans: "万相2.1文生视频增强版"
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Text description for video generation"
      zh_Hans: "视频生成的文本描述"
    llm_description: "Text prompt describing the video to generate"
    form: llm
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: "Negative Prompt"
      zh_Hans: "反向提示词"
    human_description:
      en_US: "Describe what you don't want in the video"
      zh_Hans: "描述不希望在视频中出现的内容"
    llm_description: "Negative prompt to restrict video content"
    form: llm
  - name: audio_url
    type: string
    required: false
    label:
      en_US: "Audio URL"
      zh_Hans: "音频URL"
    human_description:
      en_US: "Audio file URL for the video"
      zh_Hans: "视频音频文件URL"
    llm_description: "Audio file URL for the video"
    form: llm
  - name: size
    type: string
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Video resolution (width*height). Used by wan2.6 and earlier models."
      zh_Hans: "视频分辨率（宽*高）。用于 wan2.6 及更早模型。"
    llm_description: "Video resolution in width*height format for wan2.6 and earlier models"
    form: form
    default: "1920*1080"
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution Tier"
      zh_Hans: "分辨率档位"
    human_description:
      en_US: "Used by wan2.7-t2v. Select 720P or 1080P."
      zh_Hans: "用于 wan2.7-t2v。可选 720P 或 1080P。"
    llm_description: "Resolution tier for wan2.7-t2v"
    form: form
    default: "1080P"
    options:
      - value: "720P"
        label:
          en_US: "720P"
          zh_Hans: "720P"
      - value: "1080P"
        label:
          en_US: "1080P"
          zh_Hans: "1080P"
  - name: ratio
    type: select
    required: false
    label:
      en_US: "Aspect Ratio"
      zh_Hans: "宽高比"
    human_description:
      en_US: "Used by wan2.7-t2v. Aspect ratio for generated video."
      zh_Hans: "用于 wan2.7-t2v。设置生成视频宽高比。"
    llm_description: "Aspect ratio for wan2.7-t2v"
    form: form
    default: "16:9"
    options:
      - value: "16:9"
        label:
          en_US: "16:9"
          zh_Hans: "16:9"
      - value: "9:16"
        label:
          en_US: "9:16"
          zh_Hans: "9:16"
      - value: "1:1"
        label:
          en_US: "1:1"
          zh_Hans: "1:1"
      - value: "4:3"
        label:
          en_US: "4:3"
          zh_Hans: "4:3"
      - value: "3:4"
        label:
          en_US: "3:4"
          zh_Hans: "3:4"
  - name: duration
    type: string
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Duration of the generated video in seconds. wan2.6-t2v: integer between [2, 15], default 5. wan2.6-t2v-us: 5 or 10, default 5. wan2.5-t2v-preview: 5 or 10, default 5. wan2.2-t2v-plus: fixed at 5 seconds, not modifiable. wanx2.1-t2v-plus: fixed at 5 seconds, not modifiable. wanx2.1-t2v-turbo: fixed at 5 seconds, not modifiable."
      zh_Hans: "生成视频的时长（秒）。wan2.6-t2v：取值为[2, 15]之间的整数，默认值为5。wan2.6-t2v-us：可选值为5、10，默认值为5。wan2.5-t2v-preview：可选值为5、10，默认值为5。wan2.2-t2v-plus：固定为5秒，且不支持修改。wanx2.1-t2v-plus：固定为5秒，且不支持修改。wanx2.1-t2v-turbo：固定为5秒，且不支持修改。"
    llm_description: "Duration of the generated video in seconds"
    form: form
    default: "5"
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: "Prompt Extend"
      zh_Hans: "提示词智能改写"
    human_description:
      en_US: "Enable AI-powered prompt optimization"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
    default: true
  - name: shot_type
    type: select
    required: false
    label:
      en_US: "Shot Type"
      zh_Hans: "镜头类型"
    human_description:
      en_US: "Type of video shot. Only valid for wan2.6-t2v."
      zh_Hans: "视频镜头类型。仅 wan2.6-t2v 生效。"
    llm_description: "Type of video shot, only for wan2.6-t2v"
    form: form
    default: "single"
    options:
      - value: "single"
        label:
          en_US: "Single"
          zh_Hans: "单镜头"
      - value: "multi"
        label:
          en_US: "Multi"
          zh_Hans: "多镜头"
  - name: audio
    type: boolean
    required: false
    label:
      en_US: "Auto Audio"
      zh_Hans: "自动音频"
    human_description:
      en_US: "Automatically add audio to the generated video"
      zh_Hans: "为生成的视频自动添加音频"
    llm_description: "Whether to automatically add audio"
    form: form
    default: true
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the video"
      zh_Hans: "在视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
    default: 0
extra:
  python:
    source: tools/wan_text_2_video.py
