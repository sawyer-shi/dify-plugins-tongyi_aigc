identity:
  name: "qwen_image_2_image"
  author: "sawyer-shi"
  label:
    en_US: "Qwen Image to Image"
    zh_Hans: "Qwen-图生图"
description:
  human:
    en_US: "Generate images from text and reference images using Tongyi Qwen models"
    zh_Hans: "使用通义Qwen模型根据文本和参考图像生成图像"
  llm: "Generate images from text and reference images using Tongyi Qwen models"
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
    human_description:
      en_US: "Text description of the image you want to generate"
      zh_Hans: "您想要生成的图像的文本描述"
    llm_description: "Text description of the image to generate"
    form: llm
  - name: image
    type: file
    required: true
    label:
      en_US: Reference Image File
      zh_Hans: 参考图片文件
    human_description:
      en_US: "Reference image file for generation (<=10MB)"
      zh_Hans: "用于生成的参考图片文件（<=10MB）"
    llm_description: "Reference image file to use for generation"
    form: llm
  - name: size
    type: select
    required: false
    label:
      en_US: Image Size
      zh_Hans: 图像尺寸
    human_description:
      en_US: "Size of the generated image"
      zh_Hans: "生成图像的尺寸"
    llm_description: "Size of the generated image"
    form: form
    default: "1024*1024"
    options:
      - value: "1024*1024"
        label:
          en_US: "1:1 (1024*1024)"
          zh_Hans: "1:1 (1024*1024)"
      - value: "1536*1536"
        label:
          en_US: "1:1 (1536*1536)"
          zh_Hans: "1:1 (1536*1536)"
      - value: "768*1152"
        label:
          en_US: "2:3 (768*1152)"
          zh_Hans: "2:3 (768*1152)"
      - value: "1024*1536"
        label:
          en_US: "2:3 (1024*1536)"
          zh_Hans: "2:3 (1024*1536)"
      - value: "1152*768"
        label:
          en_US: "3:2 (1152*768)"
          zh_Hans: "3:2 (1152*768)"
      - value: "1536*1024"
        label:
          en_US: "3:2 (1536*1024)"
          zh_Hans: "3:2 (1536*1024)"
      - value: "960*1280"
        label:
          en_US: "3:4 (960*1280)"
          zh_Hans: "3:4 (960*1280)"
      - value: "1080*1440"
        label:
          en_US: "3:4 (1080*1440)"
          zh_Hans: "3:4 (1080*1440)"
      - value: "1280*960"
        label:
          en_US: "4:3 (1280*960)"
          zh_Hans: "4:3 (1280*960)"
      - value: "1440*1080"
        label:
          en_US: "4:3 (1440*1080)"
          zh_Hans: "4:3 (1440*1080)"
      - value: "720*1280"
        label:
          en_US: "9:16 (720*1280)"
          zh_Hans: "9:16 (720*1280)"
      - value: "1080*1920"
        label:
          en_US: "9:16 (1080*1920)"
          zh_Hans: "9:16 (1080*1920)"
      - value: "1280*720"
        label:
          en_US: "16:9 (1280*720)"
          zh_Hans: "16:9 (1280*720)"
      - value: "1920*1080"
        label:
          en_US: "16:9 (1920*1080)"
          zh_Hans: "16:9 (1920*1080)"
      - value: "1344*576"
        label:
          en_US: "21:9 (1344*576)"
          zh_Hans: "21:9 (1344*576)"
      - value: "2048*872"
        label:
          en_US: "21:9 (2048*872)"
          zh_Hans: "21:9 (2048*872)"
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: Negative Prompt
      zh_Hans: 反向提示词
    human_description:
      en_US: "Describe what you don't want in the image"
      zh_Hans: "描述不希望在图像中出现的内容"
    llm_description: "Negative prompt to restrict image content"
    form: llm
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: Prompt Extend
      zh_Hans: 提示词智能改写
    human_description:
      en_US: "Enable AI-powered prompt optimization"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: Watermark
      zh_Hans: 水印
    human_description:
      en_US: "Whether to add watermark to the image"
      zh_Hans: "是否在图像上添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: Seed
      zh_Hans: 随机种子
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
  - name: n
    type: number
    required: false
    label:
      en_US: Image Count
      zh_Hans: 图片数量
    human_description:
      en_US: "Number of images to generate"
      zh_Hans: "生成图像数量"
    llm_description: "Number of images to generate"
    form: form
    default: 1
    min: 1
    max: 6
  - name: model
    type: select
    required: false
    label:
      en_US: Model Version
      zh_Hans: 模型版本
    human_description:
      en_US: "Choose the Qwen image edit model version"
      zh_Hans: "选择要使用的Qwen图像编辑模型"
    llm_description: "Choose the Qwen image edit model version"
    form: form
    default: "qwen-image-edit-max"
    options:
      - value: "qwen-image-edit-max"
        label:
          en_US: "Qwen Image Edit Max"
          zh_Hans: "Qwen Image Edit Max"
      - value: "qwen-image-edit-max-2026-01-16"
        label:
          en_US: "Qwen Image Edit Max 2026-01-16"
          zh_Hans: "Qwen Image Edit Max 2026-01-16"
      - value: "qwen-image-edit-plus"
        label:
          en_US: "Qwen Image Edit Plus"
          zh_Hans: "Qwen Image Edit Plus"
      - value: "qwen-image-edit-plus-2025-12-15"
        label:
          en_US: "Qwen Image Edit Plus 2025-12-15"
          zh_Hans: "Qwen Image Edit Plus 2025-12-15"
      - value: "qwen-image-edit-plus-2025-10-30"
        label:
          en_US: "Qwen Image Edit Plus 2025-10-30"
          zh_Hans: "Qwen Image Edit Plus 2025-10-30"
      - value: "qwen-image-edit"
        label:
          en_US: "Qwen Image Edit"
          zh_Hans: "Qwen Image Edit"
extra:
  python:
    source: tools/qwen_image_2_image.py
