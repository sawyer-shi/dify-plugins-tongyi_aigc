identity:
  name: "wan_first_image_2_video"
  author: "sawyer-shi"
  label:
    en_US: "Wan-Image to Video"
    zh_Hans: "Wan-图生视频"
description:
  human:
    en_US: "Generate video with image/video inputs using Tongyi Wanxiang API"
    zh_Hans: "使用通义万相模型通过图像/视频素材生成视频"
  llm: "Create video from image or video clip with customizable parameters including model selection, prompt, media inputs, and more."
parameters:
  - name: model
    type: select
    required: true
    label:
      en_US: "Model"
      zh_Hans: "模型"
    human_description:
      en_US: "AI model to use for video generation"
      zh_Hans: "用于视频生成的AI模型"
    llm_description: "AI model for video generation"
    form: form
    default: "wan2.6-i2v"
    options:
      - value: "wan2.7-i2v"
        label:
          en_US: "Wanxiang 2.7 Image to Video"
          zh_Hans: "万相2.7图生视频"
      - value: "wan2.6-i2v"
        label:
          en_US: "Wanxiang 2.6 Image to Video"
          zh_Hans: "万相2.6图生视频"
      - value: "wan2.5-i2v-preview"
        label:
          en_US: "Wanxiang 2.5 Image to Video Preview"
          zh_Hans: "万相2.5图生视频预览"
      - value: "wan2.2-i2v-flash"
        label:
          en_US: "Wanxiang 2.2 Image to Video Flash"
          zh_Hans: "万相2.2图生视频闪速"
      - value: "wan2.2-i2v-plus"
        label:
          en_US: "Wanxiang 2.2 Image to Video Plus"
          zh_Hans: "万相2.2图生视频增强"
      - value: "wanx2.1-i2v-turbo"
        label:
          en_US: "Wanxiang 2.1 Image to Video Turbo"
          zh_Hans: "万相2.1图生视频极速"
      - value: "wanx2.1-i2v-plus"
        label:
          en_US: "Wanxiang 2.1 Image to Video Plus"
          zh_Hans: "万相2.1图生视频增强"
  - name: prompt
    type: string
    required: false
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
    human_description:
      en_US: "Text description for video generation"
      zh_Hans: "视频生成的文本描述"
    llm_description: "Text prompt describing the video to generate"
    form: llm
  - name: negative_prompt
    type: string
    required: false
    label:
      en_US: "Negative Prompt"
      zh_Hans: "反向提示词"
    human_description:
      en_US: "Describe what you don't want in the video"
      zh_Hans: "描述不希望在视频中出现的内容"
    llm_description: "Negative prompt to restrict video content"
    form: llm
  - name: image_input
    type: file
    required: false
    label:
      en_US: "Image File"
      zh_Hans: "图片文件"
    human_description:
      en_US: "Upload an image file to be used as the first frame"
      zh_Hans: "上传一个图片文件作为视频的第一帧"
    llm_description: "Upload an image file to be used as the first frame"
    form: llm
  - name: img_url
    type: string
    required: false
    label:
      en_US: "First Frame URL"
      zh_Hans: "首帧URL"
    human_description:
      en_US: "Public URL for first frame image (http/https/oss)"
      zh_Hans: "首帧图像的公网URL（http/https/oss）"
    llm_description: "First frame image URL"
    form: llm
  - name: last_frame_input
    type: file
    required: false
    label:
      en_US: "Last Frame File"
      zh_Hans: "尾帧文件"
    human_description:
      en_US: "Optional last frame image file. Mainly for wan2.7-i2v first+last frame mode."
      zh_Hans: "可选尾帧图片文件，主要用于 wan2.7-i2v 首尾帧模式。"
    llm_description: "Optional last frame image file"
    form: llm
  - name: last_frame_url
    type: string
    required: false
    label:
      en_US: "Last Frame URL"
      zh_Hans: "尾帧URL"
    human_description:
      en_US: "Optional public URL for last frame image (http/https/oss)"
      zh_Hans: "可选尾帧图像公网URL（http/https/oss）"
    llm_description: "Optional last frame image URL"
    form: llm
  - name: first_clip_url
    type: string
    required: false
    label:
      en_US: "First Clip URL"
      zh_Hans: "首段视频URL"
    human_description:
      en_US: "Video continuation input. Only for wan2.7-i2v (first_clip or first_clip+last_frame)."
      zh_Hans: "视频续写输入，仅用于 wan2.7-i2v（first_clip 或 first_clip+last_frame）。"
    llm_description: "Optional first clip video URL for continuation"
    form: llm
  - name: audio_url
    type: string
    required: false
    label:
      en_US: "Audio URL"
      zh_Hans: "音频URL"
    human_description:
      en_US: "Audio file URL for the video. For wan2.7-i2v only valid in first-frame modes."
      zh_Hans: "视频音频文件URL。wan2.7-i2v 仅在首帧模式下生效。"
    llm_description: "Audio file URL for video generation"
    form: llm
  - name: template
    type: string
    required: false
    label:
      en_US: "Video Effect Template"
      zh_Hans: "视频特效模板"
    human_description:
      en_US: "Special effect template name for the video"
      zh_Hans: "视频特效模板名称"
    llm_description: "Special effect template name for the video"
    form: form
    default: ""
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
    human_description:
      en_US: "Video resolution quality. wan2.7-i2v supports 720P/1080P only."
      zh_Hans: "视频分辨率质量。wan2.7-i2v 仅支持 720P/1080P。"
    llm_description: "Video resolution quality for image-to-video generation"
    form: form
    default: "1080P"
    options:
      - value: "480P"
        label:
          en_US: "480P"
          zh_Hans: "480P"
      - value: "720P"
        label:
          en_US: "720P"
          zh_Hans: "720P"
      - value: "1080P"
        label:
          en_US: "1080P"
          zh_Hans: "1080P"
  - name: duration
    type: string
    required: false
    label:
      en_US: "Duration (seconds)"
      zh_Hans: "时长(秒)"
    human_description:
      en_US: "Duration of the generated video in seconds. wan2.6-i2v-flash: integer between [2, 15], default 5. wan2.6-i2v: integer between [2, 15], default 5. wan2.6-i2v-us: 5, 10 or 15, default 5. wan2.5-i2v-preview: 5 or 10, default 5. wan2.2-i2v-plus: fixed at 5 seconds, not modifiable. wan2.2-i2v-flash: fixed at 5 seconds, not modifiable. wanx2.1-i2v-plus: fixed at 5 seconds, not modifiable. wanx2.1-i2v-turbo: 3, 4 or 5, default 5."
      zh_Hans: "生成视频的时长（秒）。wan2.6-i2v-flash：取值为[2, 15]之间的整数，默认值为5。wan2.6-i2v：取值为[2, 15]之间的整数，默认值为5。wan2.6-i2v-us：可选值为5、10、15，默认值为5。wan2.5-i2v-preview：可选值为5、10，默认值为5。wan2.2-i2v-plus：固定为5秒，且不支持修改。wan2.2-i2v-flash：固定为5秒，且不支持修改。wanx2.1-i2v-plus：固定为5秒，且不支持修改。wanx2.1-i2v-turbo：可选值为3、4或5，默认值为5。"
    llm_description: "Duration of the generated video in seconds"
    form: form
    default: "5"
  - name: prompt_extend
    type: boolean
    required: false
    label:
      en_US: "Prompt Extend"
      zh_Hans: "提示词智能改写"
    human_description:
      en_US: "Enable AI-powered prompt optimization"
      zh_Hans: "启用提示词智能改写"
    llm_description: "Whether to enable prompt intelligent rewriting"
    form: form
    default: true
  - name: shot_type
    type: select
    required: false
    label:
      en_US: "Shot Type"
      zh_Hans: "镜头类型"
    human_description:
      en_US: "Type of video shot"
      zh_Hans: "视频镜头类型"
    llm_description: "Type of video shot"
    form: form
    default: "single"
    options:
      - value: "single"
        label:
          en_US: "Single"
          zh_Hans: "单镜头"
      - value: "multi"
        label:
          en_US: "Multi"
          zh_Hans: "多镜头"
  - name: audio
    type: boolean
    required: false
    label:
      en_US: "Auto Audio"
      zh_Hans: "自动音频"
    human_description:
      en_US: "Automatically add audio to the generated video"
      zh_Hans: "为生成的视频自动添加音频"
    llm_description: "Whether to automatically add audio"
    form: form
    default: true
  - name: watermark
    type: boolean
    required: false
    label:
      en_US: "Watermark"
      zh_Hans: "水印"
    human_description:
      en_US: "Add watermark to the video"
      zh_Hans: "在视频中添加水印"
    llm_description: "Whether to add watermark"
    form: form
    default: true
  - name: seed
    type: number
    required: false
    label:
      en_US: "Seed"
      zh_Hans: "随机种子"
    human_description:
      en_US: "Random seed for reproducible results"
      zh_Hans: "用于可重复结果的随机种子"
    llm_description: "Random seed for reproducible results"
    form: form
    default: 0
extra:
  python:
    source: tools/wan_first_image_2_video.py
